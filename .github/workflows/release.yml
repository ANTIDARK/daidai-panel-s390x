name: Release

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries and package
    runs-on: ubuntu-latest
    outputs:
      build_suffix: ${{ steps.set_build_time.outputs.BUILD_SUFFIX }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set build time suffix
        id: set_build_time
        run: |
          BUILD_TIME=$(date -u +"%Y%m%d%H%M%S")
          BUILD_SUFFIX="${BUILD_TIME}"
          echo "BUILD_SUFFIX=${BUILD_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
          VERSION=${{ steps.set_build_time.outputs.BUILD_SUFFIX }}
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${VERSION}" -o daidai-linux-amd64 .

      - name: Build Linux s390x
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: s390x
          VERSION=${{ steps.set_build_time.outputs.BUILD_SUFFIX }}
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${VERSION}" -o daidai-linux-s390x .

      - name: Package
        run: |
          BUILD_SUFFIX="${{ steps.set_build_time.outputs.BUILD_SUFFIX }}"
          mkdir -p release/amd64 release/s390x

          cp server/config.yaml release/amd64/
          cp -r web/dist release/amd64/web
          cp server/daidai-linux-amd64 release/amd64/
          tar -C release/amd64 -czvf daidai-linux-amd64-${BUILD_SUFFIX}.tar.gz daidai-linux-amd64 config.yaml web

          cp server/config.yaml release/s390x/
          cp -r web/dist release/s390x/web
          cp server/daidai-linux-s390x release/s390x/
          tar -C release/s390x -czvf daidai-linux-s390x-${BUILD_SUFFIX}.tar.gz daidai-linux-s390x config.yaml web

          ls -lh daidai-linux-*.tar.gz

      - name: Upload tar packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BUILD_SUFFIX="${{ steps.set_build_time.outputs.BUILD_SUFFIX }}"
          RELEASE_TAG="build-${BUILD_SUFFIX}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "Auto generated build ${BUILD_SUFFIX}"
            gh release upload "${RELEASE_TAG}" \
              daidai-linux-amd64-${BUILD_SUFFIX}.tar.gz \
              daidai-linux-s390x-${BUILD_SUFFIX}.tar.gz \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              daidai-linux-amd64-${BUILD_SUFFIX}.tar.gz \
              daidai-linux-s390x-${BUILD_SUFFIX}.tar.gz \
              --title "${RELEASE_TAG}" \
              --notes "Auto generated build ${BUILD_SUFFIX}"
          fi

  docker-alpine:
    name: Build and push Alpine images (amd64 + s390x)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Alpine image for amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: VERSION=${{ needs.build.outputs.build_suffix }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine
          tags: linzixuanzz/daidai-panel:alpine-amd64-${{ needs.build.outputs.build_suffix }}

      - name: Build and push Alpine image for s390x
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/s390x
          push: true
          build-args: VERSION=${{ needs.build.outputs.build_suffix }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine
          tags: linzixuanzz/daidai-panel:alpine-s390x-${{ needs.build.outputs.build_suffix }}
*** End Patch